root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/main.exe ./cmd"
  entrypoint = "tmp\\main.exe"
  include_ext = ["go"]
  exclude_dir = ["tmp", "vendor"]
  delay = 300
  stop_on_error = true

[log]
  time = true

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"
